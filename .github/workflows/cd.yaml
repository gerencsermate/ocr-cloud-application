name: CD

permissions:
  contents: write

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_KEY: ${{ secrets.DOCKERHUB_KEY }}
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}

jobs:
  changes:
    runs-on: ubuntu-latest
    
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            file-uploader: 
              - 'file-uploader/**'
              - 'helm/templates/file-uploader/**'
              - 'helm/**'
              - '.github/**'
            notification-sender: 
              - 'notification-sender/**'
              - 'helm/templates/notification-sender/**'
              - 'helm/**'
              - '.github/**'
            ocr-analyzer: 
              - 'ocr-analyzer/**'
              - 'helm/templates/ocr-analyzer/**'
              - 'helm/**'
              - '.github/**'

  lint:
    if: ${{ needs.changes.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
       
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Pylint
        working-directory: ${{ matrix.service }}
        run: |
          pylint app/

  test:
    if: ${{ needs.changes.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
       
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          python -m pytest

  build-and-upload:
    if: ${{ needs.changes.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    runs-on: ubuntu-latest
    needs: [changes, lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_KEY }}
      
      - name: Docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    needs: [changes, build-and-upload]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Update values.yaml
        run: |
          cd helm
          SERVICES='${{ needs.changes.outputs.services }}'

          for service in $(echo $SERVICES | jq -r '.[]'); do
            SERVICE_NAME_UPPER=$(echo "${{ matrix.service }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
            VAR_NAME="${SERVICE_NAME_UPPER}_IMAGE_VERSION"
            sed -i 's|$VAR_NAME:.*|$VAR_NAME: '${{ github.sha }}'|' values.yaml
            
            echo "Updating $VAR_NAME to ${{ github.sha }}"
            sed -i "s|$VAR_NAME:.*|$VAR_NAME: \"${{ github.sha }}\"|" values.yaml
          done
          
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github'
          git add values.yaml
          git commit -m"Update values.yaml"
          git push