<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome to OCR App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #374151;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to the OCR App!</h1>
        <p>Hello {{name}}!</p>
    </div>
</body>

</html>
